<!DOCTYPE html>
<html>

<head>

<title>

BLACKBOX Control

</title>

<link rel="stylesheet"
href="{{url_for(
'static',
filename='style.css')}}">

</head>

<body>

<nav>

<div class="logo">

BLACKBOX

</div>

<div>

<a href="/">Archive</a>

<a href="/vault">

Vault

</a>

</div>

</nav>

<h1>

Control Room

</h1>

<br>

<div class="dashboard-grid">

<div class="glass-panel">

<h2>

Upload Memory

</h2>

<form
method="POST"
action="/upload-image"
enctype=
"multipart/form-data">

<input
type="file"
name="image"
required>

<textarea
name="caption"
placeholder=
"caption">

</textarea>

<button>

Upload

</button>

</form>

</div>


<div class="glass-panel">

<h2>

Submissions

</h2>

{% for submission in submissions %}

<div class="card">

{{submission.content}}

</div>

{% endfor %}

</div>

</div>

</body>

</html>
