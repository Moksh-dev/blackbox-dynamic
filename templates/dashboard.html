<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<title>
Dashboard
</title>

</head>

<body>

<div class="container">

<h1>
dashboard
</h1>

<!-- THOUGHT FORM -->

<h2>
publish thought
</h2>

<form method="POST" action="/add-thought">

<textarea
name="content"
rows="5"
placeholder="write something cinematic...">
</textarea>

<button type="submit">
publish
</button>

</form>

<br><br>

<!-- IMAGE FORM -->

<h2>
upload image
</h2>

<form
method="POST"
action="/upload-image"
enctype="multipart/form-data">

<input
type="file"
name="image"
required>

<br><br>

<textarea
name="caption"
rows="3"
placeholder="image caption">
</textarea>

<button type="submit">
upload image
</button>

</form>

<br><br>

<!-- SUBMISSIONS -->

<h2>
pending submissions
</h2>

{% for submission in submissions %}

<div class="card">

<p>
{{ submission.content }}
</p>

<br>

<a href="/approve/{{ submission.id }}">

<button>
approve
</button>

</a>

</div>

{% endfor %}

</div>

</body>
</html>
